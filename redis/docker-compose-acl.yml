services:
  redis_ekos:
    image: redis:alpine
    container_name: redis_exaudie_container
    ports:
      - "6389:6379"
    restart: unless-stopped
    volumes:
      - exaudie_volume:/redis_data
      - ./redis.acl:/redis/redis.acl:ro
    command: redis-server --aclfile /redis/redis.acl --save 20 1
    networks:
      - exaudie_network

networks:
  exaudie_network:

volumes:
  exaudie_volume:
    driver: local
